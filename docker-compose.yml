version: '3.8'
services:
  agent-forge:
    build: .
    ports:
      - "23000:23000"
      - "5173:5173"
    volumes:
      - agent-forge-data:/app/.agent-forge
      - /tmp/agent-forge:/tmp/agent-forge
    environment:
      - AGENT_FORGE_PORT=23000
      - AGENT_FORGE_HOST=0.0.0.0
    restart: unless-stopped

volumes:
  agent-forge-data:
